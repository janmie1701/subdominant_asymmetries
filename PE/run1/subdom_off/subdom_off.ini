################################################################################
## Data generation arguments
################################################################################
detectors = ['ET']
psd_dict = {"ET": "ET_D_psd.txt", "ET1": "ET_D_psd.txt", "ET2": "ET_D_psd.txt", "ET3": "ET_D_psd.txt"}
gaussian-noise = False
zero-noise = True
duration = 8 
trigger-time = 10
injection = True
injection-dict = {'total_mass': 70, 
  'mass_ratio': 0.667, 
  'a_1': 0.8, 
  'a_2': 0.5, 
  'tilt_1': 1.5707963267948966, 
  'tilt_2': 1.5707963267948966, 
  'phi_12': 0.03163042414374728, 
  'phi_jl': 3.399246630035568, 
  'luminosity_distance': 680, 
  'dec': 0.1, 
  'ra': 0.1, 
  'theta_jn': 0.341522468089182, 
  'psi': 1.0471975512, 
  'phase': 0, 
  'geocent_time': 10
}
injection-waveform-approximant = NRSur7dq4
minimum-frequency = {"ET": 20, "ET1": 20, "ET2": 20, "ET3": 20, "waveform": 20}
maximum-frequency = {"ET": 2048, "ET1": 2048, "ET2": 2048, "ET3": 2048, "waveform": 2048}
reference-frequency = 20
calibration-correction-type = {"ET": "template"}

################################################################################
## Job submission arguments
################################################################################
label = subdom_off
outdir = outdir
overwrite-outdir = True

################################################################################
## Likelihood arguments
################################################################################
time-marginalization = False
phase-marginalization = False
distance-marginalization = True
reference-frame = sky
time-reference = geocent
likelihood-type = GravitationalWaveTransient

################################################################################
## Prior arguments
################################################################################
default-prior = BBHPriorDict
prior-file = None
prior-dict = {
  chirp_mass = bilby.gw.prior.UniformInComponentsChirpMass(name='chirp_mass', minimum=10, maximum=50),
  mass_ratio = bilby.gw.prior.UniformInComponentsMassRatio(name='mass_ratio', minimum=0.167, maximum=1),
  mass_1 = Constraint(name='mass_1', minimum=1.001398, maximum=1000),
  mass_2 = Constraint(name='mass_2', minimum=1.001398, maximum=1000),
  a_1 = Uniform(name='a_1', minimum=0, maximum=0.99),
  a_2 = Uniform(name='a_2', minimum=0, maximum=0.99),
  tilt_1 = Sine(name='tilt_1', minimum=0, maximum=np.pi),
  tilt_2 = Sine(name='tilt_2', minimum=0, maximum=np.pi),
  phi_12 = Uniform(name='phi_12', minimum=0, maximum=2*np.pi, boundary='periodic'),
  phi_jl = Uniform(name='phi_jl', minimum=0, maximum=2*np.pi, boundary='periodic'),
  luminosity_distance = bilby.gw.prior.UniformSourceFrame(name='luminosity_distance', minimum=100, maximum=5000),
  dec = Cosine(name='dec'),
  ra = Uniform(name='ra', minimum=0, maximum=2*np.pi, boundary='periodic'),
  theta_jn = Sine(name='theta_jn'),
  psi = Uniform(name='psi', minimum=0, maximum=np.pi, boundary='periodic'),
  phase = Uniform(name='phase', minimum=0, maximum=2*np.pi, boundary='periodic'),
  geocent_time = Uniform(minimum=9.9, maximum=10.1, name='geocent_time', boundary=None)
}
deltaT = .02
enforce-signal-duration = True

################################################################################
## Waveform arguments
################################################################################
waveform-generator = bilby.gw.waveform_generator.WaveformGenerator
waveform_approximant = NRSur7dq4_subdom_off
frequency-domain-source-model = lal_binary_black_hole
catch-waveform-errors = True

###############################################################################
## Output arguments
###############################################################################
plot-data = True
plot-injection = True
plot-waveform = True
plot-format = png
create-summary = False
result-format = json

###############################################################################
## Sampler settings
################################################################################
sampler = dynesty
sampling-seed = None
n-parallel = 1
sampler-kwargs={'nlive': 2000, 
  'check_point_plot': True, 
  'check_point_delta_t': 1800, 
  'print_method': 'interval-60', 
  'npool': 2, 
  'update_interval': 600, 
  'enlarge': 1.5
}

################################################################################
## Slurm Settings
################################################################################
scheduler = slurm
scheduler-analysis-time = 10-00:00:00
local = False
local-generation = True
local-plot = False
request-cpus = 80
